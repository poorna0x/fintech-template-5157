[build]
  # Clear cache directories and do fresh install to avoid old cached dependencies
  command = "rm -rf node_modules/.cache .cache dist && cd netlify/functions && npm install && cd ../.. && npm install && npm run build"
  publish = "dist"

[dev]
  command = "npm run dev:vite"

[functions]
  directory = "netlify/functions"

# Force HTTPS redirect - redirect HTTP to HTTPS
[[redirects]]
  from = "http://hydrogenro.com/*"
  to = "https://hydrogenro.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.hydrogenro.com/*"
  to = "https://hydrogenro.com/:splat"
  status = 301
  force = true

# Redirect old pages to main site with 301 status
[[redirects]]
  from = "/go"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go/"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go2"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go2/"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Allow sitemap and robots.txt to be accessed directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# Handle SPA routing - redirect all non-API requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Environment variables are set in Netlify dashboard to avoid exposing API keys in git
# Add VITE_GOOGLE_MAPS_API_KEY in Netlify → Site settings → Environment variables

# Headers for caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(), camera=()"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# No cache for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
