# Production (live) deploys only when the production branch is pushed.
# In Netlify: Site settings > Build & deploy > Continuous deployment >
# set "Production branch" to "main" and enable "Only deploy production branch" if you want live = main only.

[build]
  # Clear cache directories and do fresh install to avoid old cached dependencies
  command = "rm -rf node_modules/.cache .cache dist && cd netlify/functions && npm install && cd ../.. && npm install && npm run build"
  publish = "dist"

[context.production]
  command = "rm -rf node_modules/.cache .cache dist && cd netlify/functions && npm install && cd ../.. && npm install && npm run build"
  publish = "dist"

[dev]
  command = "npm run dev:vite"

[functions]
  directory = "netlify/functions"

# Force HTTPS - redirect HTTP to HTTPS
[[redirects]]
  from = "http://hydrogenro.com/*"
  to = "https://hydrogenro.com/:splat"
  status = 301
  force = true

# Redirect old pages to main site with 301 status
[[redirects]]
  from = "/go"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go/"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go2"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/go2/"
  to = "https://hydrogenro.com"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Allow sitemap and robots.txt to be accessed directly
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# Handle SPA routing - redirect all non-API requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"

# Environment variables are set in Netlify dashboard to avoid exposing API keys in git
# Add VITE_GOOGLE_MAPS_API_KEY in Netlify → Site settings → Environment variables

# Headers for caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache static assets for better performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# Favicon files - shorter cache to allow updates, but still cacheable
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    X-Content-Type-Options = "nosniff"
[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/favicon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/apple-touch-icon.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
[[headers]]
  for = "/android-chrome-*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# No cache for HTML files
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
