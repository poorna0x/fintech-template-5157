<!DOCTYPE html>
<html>
<head>
    <title>Cloudinary Test</title>
</head>
<body>
    <h1>Cloudinary Upload Test</h1>
    <input type="file" id="fileInput" accept="image/*">
    <div id="result"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const result = document.getElementById('result');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'ro-service-uploads');
            formData.append('folder', 'test-uploads');

            try {
                console.log('Testing Cloudinary upload...');
                const response = await fetch('https://api.cloudinary.com/v1_1/dnbpshwiz/image/upload', {
                    method: 'POST',
                    body: formData,
                    mode: 'cors',
                    credentials: 'omit'
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Upload failed:', errorText);
                    result.innerHTML = `<p style="color: red;">Upload failed: ${response.status} - ${errorText}</p>`;
                    return;
                }

                const data = await response.json();
                console.log('Upload successful:', data);
                result.innerHTML = `
                    <p style="color: green;">Upload successful!</p>
                    <p>Public ID: ${data.public_id}</p>
                    <p>URL: <a href="${data.secure_url}" target="_blank">${data.secure_url}</a></p>
                    <img src="${data.secure_url}" style="max-width: 300px; height: auto;">
                `;
            } catch (error) {
                console.error('Error:', error);
                result.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
