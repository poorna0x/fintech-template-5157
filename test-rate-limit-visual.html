<!DOCTYPE html>
<html>
<head>
    <title>Rate Limiting Test</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #0f0; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #0f0; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .blocked { color: #ff0; background: #330; padding: 5px; }
        button { padding: 10px 20px; margin: 5px; background: #0f0; color: #000; border: none; cursor: pointer; }
        button:hover { background: #0a0; }
        #results { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🧪 Rate Limiting Test</h1>
    <p>Click the button below to make rapid requests to test rate limiting.</p>
    
    <div>
        <button onclick="testRateLimit()">Test Password Verification (5 req limit)</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>
    
    <div id="results"></div>

    <script>
        async function testRateLimit() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<h2>Testing Rate Limiting...</h2>';
            
            for (let i = 1; i <= 7; i++) {
                try {
                    const start = Date.now();
                    const response = await fetch('http://localhost:8888/.netlify/functions/verify-technician-password', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Origin': 'http://localhost:8080',
                            'X-Forwarded-For': '127.0.0.1'
                        },
                        body: JSON.stringify({
                            password: 'test',
                            hashedPassword: '$2a$10$test'
                        })
                    });
                    
                    const elapsed = Date.now() - start;
                    const data = await response.json();
                    
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'test';
                    
                    if (response.status === 429) {
                        resultDiv.innerHTML = `
                            <span class="blocked">🚫 Request ${i}: BLOCKED (429 Rate Limited)</span><br>
                            Status: ${response.status}<br>
                            Message: ${data.message || data.error || 'Rate limit exceeded'}<br>
                            Retry-After: ${response.headers.get('Retry-After') || 'N/A'}<br>
                            Time: ${elapsed}ms
                        `;
                        resultsDiv.appendChild(resultDiv);
                        break;
                    } else if (response.status === 200) {
                        resultDiv.innerHTML = `
                            <span class="success">✅ Request ${i}: ALLOWED (200 OK)</span><br>
                            Response: ${JSON.stringify(data)}<br>
                            Time: ${elapsed}ms
                        `;
                        resultsDiv.appendChild(resultDiv);
                    } else {
                        resultDiv.innerHTML = `
                            <span class="error">❓ Request ${i}: Status ${response.status}</span><br>
                            Response: ${JSON.stringify(data)}<br>
                            Time: ${elapsed}ms
                        `;
                        resultsDiv.appendChild(resultDiv);
                    }
                } catch (error) {
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'test error';
                    resultDiv.innerHTML = `<span class="error">❌ Request ${i}: ERROR - ${error.message}</span>`;
                    resultsDiv.appendChild(resultDiv);
                }
                
                // Small delay
                await new Promise(r => setTimeout(r, 200));
            }
            
            // Summary
            const summary = document.createElement('div');
            summary.className = 'test';
            summary.innerHTML = '<h3>📊 Test Complete</h3>Check results above. If you see 429 responses, rate limiting is working!';
            resultsDiv.appendChild(summary);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
    </script>
</body>
</html>
