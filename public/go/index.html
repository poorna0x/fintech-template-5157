<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=https://hydrogenro.com">
    <link rel="canonical" href="https://hydrogenro.com">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hydrogenro.com/">
    <meta property="og:title" content="Hydrogen RO - Water Purification Services">
    <meta property="og:description" content="Professional water purification and RO services">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://hydrogenro.com/">
    <meta property="twitter:title" content="Hydrogen RO - Water Purification Services">
    <meta property="twitter:description" content="Professional water purification and RO services">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .redirect-container {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 {
            margin: 0 0 1rem 0;
            font-size: 1.5rem;
            font-weight: 600;
        }
        p {
            margin: 0;
            opacity: 0.9;
        }
        .manual-link {
            margin-top: 1rem;
        }
        .manual-link a {
            color: white;
            text-decoration: underline;
            font-weight: 500;
        }
        .manual-link a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="redirect-container">
        <div class="spinner"></div>
        <h1>Redirecting...</h1>
        <p>You are being redirected to Hydrogen RO</p>
        <div class="manual-link">
            <p>If you are not redirected automatically, <a href="https://hydrogenro.com">click here</a></p>
        </div>
    </div>
    
    <script>
        // Immediate redirect as backup
        window.location.href = 'https://hydrogenro.com';
        
        // Track redirect for analytics (optional)
        if (typeof gtag !== 'undefined') {
            gtag('event', 'redirect', {
                'event_category': 'navigation',
                'event_label': 'go_page_redirect'
            });
        }
    </script>
</body>
</html>
